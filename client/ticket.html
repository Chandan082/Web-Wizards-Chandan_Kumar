<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Ticket</title>
    <style>
      body { font-family: Arial, sans-serif; background: #f3f4f6; margin: 0; padding: 20px; }
      .ticket-wrapper { max-width: 560px; margin: 0 auto; background: #fff; border-radius: 16px; overflow: hidden; border: 1px solid #e5e7eb; box-shadow: 0 10px 25px rgba(0,0,0,.06); }
      .ticket-header { background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; text-align: center; padding: 28px 16px; }
      .ticket-header h1 { margin: 0; font-size: 24px; }
      .ticket-body { padding: 22px; }
      .row { display: flex; justify-content: space-between; gap: 16px; margin-bottom: 10px; }
      .label { color: #64748b; font-size: 12px; text-transform: uppercase; font-weight: 700; }
      .value { color: #111827; font-weight: 700; margin-top: 2px; }
      .qr-wrap { text-align: center; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px; margin-top: 16px; }
      .qr-wrap img { width: 160px; height: 160px; border: 1px solid #e2e8f0; background: #fff; border-radius: 8px; padding: 10px; }
      .actions { max-width: 560px; margin: 16px auto 0; display: flex; gap: 10px; flex-wrap: wrap; }
      button, a { border: 0; border-radius: 8px; padding: 10px 14px; cursor: pointer; text-decoration: none; }
      .btn-primary { background: #2563eb; color: #fff; }
      .btn-dark { background: #1f2937; color: #fff; }
      .btn-muted { background: #475569; color: #fff; }
    </style>
  </head>
  <body>
    <div id="ticket-card" class="ticket-wrapper">
      <div class="ticket-header">
        <h1>Booking Confirmed</h1>
        <p>Present this ticket at the entrance</p>
      </div>
      <div class="ticket-body">
        <h2 style="margin:0 0 6px;">Technovanza 2026</h2>
        <p style="margin:0 0 16px; color:#64748b;">Central Institute of Tech, Main Auditorium</p>

        <div class="row">
          <div><div class="label">Attendee</div><div id="t-name" class="value">-</div></div>
          <div><div class="label">Seat</div><div id="t-seat" class="value">-</div></div>
        </div>
        <div class="row">
          <div><div class="label">College</div><div id="t-college" class="value">-</div></div>
          <div><div class="label">Date & Time</div><div class="value">Sat, Oct 25 • 10:00 AM</div></div>
        </div>

        <div class="qr-wrap">
          <div class="label">Scan At Entry</div>
          <img id="t-qr" alt="ticket qr" src="" />
          <div id="t-id" class="value" style="margin-top:8px;">ID: -</div>
        </div>
      </div>
    </div>

    <div class="actions">
      <button id="printBtn" class="btn-dark" type="button">Print Ticket</button>
      <button id="downloadBtn" class="btn-primary" type="button">Download Ticket (HTML)</button>
      <a href="./booking.html" class="btn-muted">Book Another</a>
      <a href="./login.html" id="logoutLink" class="btn-muted">Logout</a>
    </div>

    <script src="./script.js"></script>
  </body>
  </html>
